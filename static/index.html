<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杏林问答 — 中医药知识智能问答系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f5f0e8;
            --bg-card: #faf7f0;
            --bg-sidebar: #ede6d8;
            --text: #2c2416;
            --text-muted: #8b7a62;
            --text-dim: #b8a387;
            --border: #d4c8b0;
            --primary: #c43a31;
            --primary-light: #d4533d;
            --primary-dark: #9a2e27;
            --accent: #c43a31;
            --accent-soft: #f5e8e0;
            --herb: #5b8c5a;
            --herb-light: #e8efe2;
            --gold: #b8963e;
            --gold-light: #faf3e6;
            --radius: 3px;
            --radius-sm: 2px;
            --shadow: 0 2px 8px rgba(44, 36, 22, 0.08);
            --shadow-lg: 0 4px 20px rgba(44, 36, 22, 0.12);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --ink-spread: 0 0 0 4px rgba(184, 150, 62, 0.12);
        }

        body.dark-mode {
            --bg: #1a1c1f;
            --bg-card: #222420;
            --bg-sidebar: #1d1f1b;
            --text: #d4c8b8;
            --text-muted: #9b8e78;
            --text-dim: #6b5f50;
            --border: #3a3528;
            --primary: #b84a3a;
            --primary-dark: #8a3028;
            --accent-soft: #2a2018;
            --herb-light: #1a2218;
            --gold-light: #2a2218;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.4);
            --ink-spread: 0 0 0 4px rgba(184, 150, 62, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
            line-height: 1.8;
            color: var(--text);
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(180, 160, 140, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(180, 160, 140, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(200, 190, 170, 0.08) 0%, transparent 70%);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 0.4s, color 0.4s;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180, 160, 140, 0.03) 2px, rgba(180, 160, 140, 0.03) 3px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(180, 160, 140, 0.02) 2px, rgba(180, 160, 140, 0.02) 3px);
        }

        /* === Header === */
        header {
            background: linear-gradient(180deg, #5a3020 0%, #4a2818 60%, #3a1f10 100%);
            color: #efe4d8;
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow:
                0 2px 12px rgba(44, 20, 10, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border-bottom: 2px solid var(--gold);
            z-index: 10;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(180deg, rgba(0,0,0,0.15), transparent);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-seal {
            width: 42px;
            height: 42px;
            border: 2px solid #c43a31;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c43a31;
            font-size: 1.4rem;
            font-weight: 900;
            font-family: 'STKaiti', 'KaiTi', 'Noto Serif SC', serif;
            transform: rotate(-3deg);
            flex-shrink: 0;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            font-family: 'STKaiti', 'KaiTi', 'Noto Serif SC', serif;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 0.12em;
            font-family: 'Noto Serif SC', serif;
        }

        .header-right {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .theme-toggle, .github-link {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #efe4d8;
            width: 34px;
            height: 34px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .theme-toggle:hover, .github-link:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: var(--gold);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* === Layout === */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .chat-container {
            display: flex;
            flex: 1;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-card);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        /* === Sidebar === */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            padding: 1.2rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .search-box {
            padding: 0.55rem 1rem;
            border-radius: 3px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            transition: var(--transition);
            font-family: inherit;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--gold);
            box-shadow: var(--ink-spread);
        }

        .session-controls {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .new-session-btn {
            flex: 1;
            padding: 0.5rem 0.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--primary);
            cursor: pointer;
            font-size: 0.82rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            font-family: inherit;
            background: var(--primary);
            color: #fff;
        }
        .new-session-btn:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(196, 58, 49, 0.25);
        }

        .clear-history-btn {
            flex: 1;
            padding: 0.5rem 0.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.82rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            font-family: inherit;
            background: transparent;
            color: var(--text-muted);
        }
        .clear-history-btn:hover {
            background: #fdeded;
            color: var(--accent);
            border-color: var(--accent);
        }

        .history-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            font-family: 'STKaiti', 'KaiTi', 'Noto Serif SC', serif;
        }
        .history-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 1em;
            background: var(--gold);
            border-radius: 1px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .history-item {
            padding: 0.7rem 0.8rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 0.4rem;
            background: var(--bg-card);
            border-left: 3px solid transparent;
            position: relative;
        }
        .history-item::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            transition: transform 0.25s ease;
        }
        .history-item:hover {
            border-left-color: transparent;
            transform: translateX(4px);
            box-shadow: var(--shadow);
        }
        .history-item:hover::before {
            transform: translateY(-50%) scale(1);
        }

        .history-question {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .history-answer {
            color: var(--text-muted);
            font-size: 0.78rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .history-item + .history-item {
            border-top: 1px solid rgba(184, 150, 62, 0.15);
            margin-top: 0.2rem;
            padding-top: 0.8rem;
        }

        .session-info {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border);
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        /* === Main Chat === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            background: var(--bg-card);
            box-shadow: inset 0 0 60px rgba(44, 36, 22, 0.04);
        }

        .chat-history {
            flex: 1;
            padding: 1.5rem 2rem;
            overflow-y: auto;
            scroll-behavior: smooth;
            scrollbar-width: thin;
        }

        .chat-history::-webkit-scrollbar,
        .history-list::-webkit-scrollbar {
            width: 5px;
        }
        .chat-history::-webkit-scrollbar-thumb,
        .history-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .chat-history::-webkit-scrollbar-thumb:hover,
        .history-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        /* === Messages === */
        .message {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.35rem;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 3px;
            margin-right: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .user-msg .avatar {
            background: var(--primary);
            color: #fff;
        }
        .sys-msg .avatar {
            background: var(--herb-light);
            color: var(--herb);
            border: 1px solid var(--herb);
        }

        .message-content {
            padding: 0.8rem 1.1rem;
            border-radius: var(--radius);
            max-width: 78%;
            word-break: break-word;
            line-height: 1.85;
            font-size: 0.95rem;
            box-shadow: var(--shadow);
        }

        .user-msg {
            align-self: flex-end;
            align-items: flex-end;
        }
        .user-msg .message-content {
            background: linear-gradient(135deg, #c43a31, #a8322a);
            color: #fff;
            border-bottom-right-radius: 2px;
            box-shadow: 0 2px 8px rgba(196, 58, 49, 0.2);
        }

        .sys-msg {
            align-self: flex-start;
        }
        .sys-msg .message-content {
            background: rgba(245, 240, 232, 0.6);
            border-left: 3px solid var(--gold);
            border-radius: 2px;
            border-top-right-radius: var(--radius);
            border-bottom-right-radius: var(--radius);
        }

        /* Markdown content styles */
        .message-content p { margin-bottom: 0.5rem; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content pre {
            background: rgba(0, 0, 0, 0.04);
            padding: 0.8rem 1rem;
            border-radius: 2px;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-size: 0.85rem;
            border-left: 2px solid var(--gold);
        }
        body.dark-mode .message-content pre {
            background: rgba(0, 0, 0, 0.25);
        }
        .message-content code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.88rem;
        }
        .message-content ul, .message-content ol {
            padding-left: 1.5rem;
            margin: 0.5rem 0;
        }

        /* === Typing Indicator === */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.7rem 1.2rem;
            background: rgba(245, 240, 232, 0.6);
            border-left: 3px solid var(--gold);
            border-radius: 2px;
            border-top-right-radius: var(--radius);
            border-bottom-right-radius: var(--radius);
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }

        .typing-indicator span {
            width: 4px;
            height: 14px;
            border-radius: 2px;
            background: var(--gold);
            animation: inkDip 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes inkDip {
            0%, 60%, 100% { transform: scaleY(0.6); opacity: 0.4; }
            30% { transform: scaleY(1); opacity: 1; }
        }

        /* === Chat Input === */
        .chat-input-container {
            padding: 1rem 1.5rem 1.2rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }

        .source-filter {
            display: flex;
            align-items: center;
            margin-bottom: 0.6rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .source-filter select {
            margin-left: 0.5rem;
            padding: 0.3rem 0.8rem;
            border-radius: 2px;
            border: 1.5px solid var(--border);
            background: var(--bg-sidebar);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        .source-filter select:focus {
            border-color: var(--gold);
            box-shadow: var(--ink-spread);
        }

        .input-group {
            display: flex;
            position: relative;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 3.2rem 0.75rem 1.2rem;
            border: 1.5px solid var(--border);
            border-radius: 3px;
            font-size: 0.95rem;
            resize: none;
            min-height: 48px;
            max-height: 160px;
            overflow-y: auto;
            background: #e8e0d5;
            color: #2c2416;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
            line-height: 1.5;
        }

        body.dark-mode .chat-input {
            background: #2a2824;
            color: #d4c8b8;
        }

        .chat-input:focus {
            border-color: var(--gold);
            box-shadow: var(--ink-spread);
        }

        .chat-input::placeholder {
            color: var(--text-dim);
        }

        .send-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'STKaiti', 'KaiTi', serif;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .send-btn:hover {
            transform: translateY(-50%) scale(1.06);
            box-shadow: 0 4px 12px rgba(196, 58, 49, 0.3);
        }

        .send-btn:active {
            transform: translateY(-50%) scale(0.96);
            transition: 0.08s ease;
        }

        .send-btn:disabled {
            background: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        .send-btn:disabled:hover {
            transform: translateY(-50%) scale(1);
        }

        /* === Quick Replies === */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.7rem;
        }

        .quick-reply-btn {
            padding: 0.3rem 0.9rem;
            background: var(--gold-light);
            border: 1px solid var(--gold);
            border-radius: 2px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.78rem;
            transition: var(--transition);
            font-family: 'STKaiti', 'KaiTi', 'Noto Serif SC', serif;
            letter-spacing: 0.03em;
        }

        .quick-reply-btn:hover {
            background: var(--gold-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(196, 58, 49, 0.1);
        }

        /* === Loading Overlay === */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(245, 240, 232, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            visibility: hidden;
            backdrop-filter: blur(3px);
            transition: var(--transition);
        }
        body.dark-mode .loading-overlay {
            background: rgba(26, 28, 31, 0.5);
        }

        .ink-spinner {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--text-muted) 10%, transparent 60%);
            animation: inkSpread 1.2s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes inkSpread {
            0%, 100% { transform: scale(0.8); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        /* === Welcome Card === */
        .welcome-card {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 520px;
            margin: 0 auto;
        }

        .welcome-card::before {
            content: '';
            display: block;
            width: 40px;
            height: 2px;
            background: var(--gold);
            margin: 0 auto 1.5rem;
            border-radius: 1px;
        }

        .welcome-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
            opacity: 0.8;
        }

        .welcome-card h2 {
            font-family: 'STKaiti', 'KaiTi', 'Noto Serif SC', serif;
            font-size: 1.4rem;
            color: var(--text);
            margin-bottom: 0.8rem;
            letter-spacing: 0.08em;
        }

        .welcome-card p {
            color: var(--text-muted);
            font-size: 0.88rem;
            line-height: 2;
        }

        .category-chips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .category-chip {
            padding: 0.35rem 0.9rem;
            border-radius: 2px;
            font-size: 0.8rem;
            border: 1px solid var(--gold);
            background: var(--gold-light);
            color: var(--text-muted);
            cursor: default;
            transition: var(--transition);
            font-family: 'STKaiti', 'KaiTi', serif;
            letter-spacing: 0.04em;
        }

        .category-chip:hover {
            border-color: var(--herb);
            color: var(--herb);
            background: var(--herb-light);
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 180px;
                padding: 0.8rem;
            }

            .message-content {
                max-width: 92%;
            }

            .chat-history {
                padding: 1rem;
            }

            header h1 {
                font-size: 1.2rem;
            }

            .header-seal {
                width: 34px;
                height: 34px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-seal">问答</div>
            <div class="header-text">
                <h1>杏林问答</h1>
                <div class="header-subtitle">中医药知识智能问答系统</div>
            </div>
        </div>
        <div class="header-right">
            <a href="https://github.com" target="_blank" class="github-link" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <button class="theme-toggle" id="themeToggle" title="切换夜读模式">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="container">
        <div class="chat-container">
            <div class="sidebar">
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索历史会话...">

                <div class="session-controls">
                    <button class="new-session-btn" id="newSessionBtn">
                        <i class="fas fa-plus"></i> 新会话
                    </button>
                    <button class="clear-history-btn" id="clearHistoryBtn">
                        <i class="fas fa-trash"></i> 清除
                    </button>
                </div>

                <div class="history-title">
                    <i class="fas fa-clock"></i> 历史会话
                </div>
                <div class="history-list" id="historyList"></div>
                <div class="session-info" id="sessionInfo"></div>
            </div>

            <div class="main-content">
                <div class="chat-history" id="chatHistory">
                    <div class="welcome-card">
                        <div class="welcome-icon">🏥</div>
                        <h2>杏林春暖 · 橘井泉香</h2>
                        <p>大医精诚，悬壶济世。<br>
                        无论您想了解中药药性、方剂配伍，<br>还是中医理论、针灸穴位，<br>我都能为您答疑解惑。</p>
                        <div class="category-chips">
                            <span class="category-chip">中药基础</span>
                            <span class="category-chip">方剂学</span>
                            <span class="category-chip">中医基础理论</span>
                            <span class="category-chip">针灸学</span>
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="source-filter">
                        <label for="sourceFilter">📂 知识分类：</label>
                        <select id="sourceFilter">
                            <option value="">全部</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <textarea class="chat-input" id="chatInput" placeholder="请输入您想了解的中医药问题..."
                            rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                        <button class="send-btn" id="sendBtn" title="发送">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="quick-replies" id="quickReplies">
                        <button class="quick-reply-btn">什么是四气五味？</button>
                        <button class="quick-reply-btn">四君子汤的组成？</button>
                        <button class="quick-reply-btn">足三里穴在哪里？</button>
                        <button class="quick-reply-btn">什么是八纲辨证？</button>
                    </div>
                </div>

                <div class="loading-overlay" id="loadingOverlay">
                    <div class="ink-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var currentSessionId = null;
        var isResponseInProgress = false;
        var socket = null;
        var isDarkMode = false;

        var chatHistory = document.getElementById('chatHistory');
        var chatInput = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var sourceFilter = document.getElementById('sourceFilter');
        var historyList = document.getElementById('historyList');
        var sessionInfo = document.getElementById('sessionInfo');
        var newSessionBtn = document.getElementById('newSessionBtn');
        var clearHistoryBtn = document.getElementById('clearHistoryBtn');
        var loadingOverlay = document.getElementById('loadingOverlay');
        var themeToggle = document.getElementById('themeToggle');
        var searchBox = document.getElementById('searchBox');
        var quickReplies = document.getElementById('quickReplies');
        var quickReplyBtns = quickReplies.querySelectorAll('.quick-reply-btn');
        var API_BASE_URL = '';

        document.addEventListener('DOMContentLoaded', async function() {
            isDarkMode = localStorage.getItem('darkMode') === 'true';
            updateTheme();
            await createNewSession();
            await loadSources();

            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            newSessionBtn.addEventListener('click', createNewSession);
            clearHistoryBtn.addEventListener('click', clearHistory);
            themeToggle.addEventListener('click', toggleTheme);
            searchBox.addEventListener('input', searchHistory);

            quickReplyBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    chatInput.value = btn.textContent;
                    chatInput.style.height = 'auto';
                    chatInput.style.height = chatInput.scrollHeight + 'px';
                    sendMessage();
                });
            });
        });

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            updateTheme();
        }

        function updateTheme() {
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-dragon"></i>';
                themeToggle.title = '切换到日间模式';
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                themeToggle.title = '切换到夜读模式';
            }
        }

        function searchHistory() {
            var term = searchBox.value.toLowerCase();
            var items = historyList.querySelectorAll('.history-item');
            items.forEach(function(item) {
                var q = (item.querySelector('.history-question') || {}).textContent || '';
                var a = (item.querySelector('.history-answer') || {}).textContent || '';
                item.style.display = (q + a).toLowerCase().includes(term) ? 'block' : 'none';
            });
        }

        async function createNewSession() {
            showLoading();
            try {
                var res = await fetch(API_BASE_URL + '/api/create_session', { method: 'POST' });
                if (!res.ok) throw new Error('创建会话失败');
                var data = await res.json();
                currentSessionId = data.session_id;
                sessionInfo.textContent = '会话: ' + currentSessionId.slice(0, 8) + '...';
                resetChatHistory();
                await loadHistory();
            } catch (e) {
                console.error('创建会话错误:', e);
            } finally {
                hideLoading();
            }
        }

        async function loadSources() {
            try {
                var res = await fetch(API_BASE_URL + '/api/sources');
                if (!res.ok) throw new Error('获取分类失败');
                var data = await res.json();
                sourceFilter.innerHTML = '<option value="">全部</option>';
                data.sources.forEach(function(s) {
                    var opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    sourceFilter.appendChild(opt);
                });
            } catch (e) {
                console.error('加载分类错误:', e);
            }
        }

        async function loadHistory() {
            if (!currentSessionId) return;
            try {
                var res = await fetch(API_BASE_URL + '/api/history/' + currentSessionId);
                if (!res.ok) throw new Error('获取历史失败');
                var data = await res.json();
                historyList.innerHTML = '';
                var item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML =
                    '<div class="history-question">会话 ' + currentSessionId.slice(0, 8) + '...</div>' +
                    '<div class="history-answer">共 ' + data.history.length + ' 轮对话</div>';
                item.addEventListener('click', function() {
                    resetChatHistory();
                    data.history.forEach(function(h) {
                        addMessage('user', h.question);
                        addMessage('system', h.answer);
                    });
                    scrollToBottom();
                });
                historyList.appendChild(item);
            } catch (e) {
                console.error('加载历史错误:', e);
            }
        }

        async function clearHistory() {
            if (!currentSessionId || !confirm('确定要清除所有历史记录吗？')) return;
            showLoading();
            try {
                var res = await fetch(API_BASE_URL + '/api/history/' + currentSessionId, { method: 'DELETE' });
                if (!res.ok) throw new Error('清除失败');
                historyList.innerHTML = '';
                resetChatHistory();
            } catch (e) {
                console.error('清除历史错误:', e);
            } finally {
                hideLoading();
            }
        }

        function resetChatHistory() {
            chatHistory.innerHTML =
                '<div class="welcome-card">' +
                '<div class="welcome-icon">🏥</div>' +
                '<h2>杏林春暖 · 橘井泉香</h2>' +
                '<p>大医精诚，悬壶济世。<br>' +
                '无论您想了解中药药性、方剂配伍，<br>还是中医理论、针灸穴位，<br>我都能为您答疑解惑。</p>' +
                '<div class="category-chips">' +
                '<span class="category-chip">中药基础</span>' +
                '<span class="category-chip">方剂学</span>' +
                '<span class="category-chip">中医基础理论</span>' +
                '<span class="category-chip">针灸学</span>' +
                '</div></div>';
        }

        function showLoading() { loadingOverlay.style.visibility = 'visible'; }
        function hideLoading() { loadingOverlay.style.visibility = 'hidden'; }

        async function sendMessage() {
            var query = chatInput.value.trim();
            var filter = sourceFilter.value;
            if (!query || isResponseInProgress) return;

            chatInput.value = '';
            chatInput.style.height = 'auto';
            addMessage('user', query);
            isResponseInProgress = true;

            var typingEl = document.createElement('div');
            typingEl.className = 'typing-indicator';
            typingEl.innerHTML = '<span></span><span></span><span></span>';
            chatHistory.appendChild(typingEl);
            scrollToBottom();

            try {
                var res = await fetch(API_BASE_URL + '/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, source_filter: filter || null, session_id: currentSessionId })
                });
                if (!res.ok) throw new Error('查询失败');
                var data = await res.json();
                removeTyping(typingEl);

                if (data.is_streaming) {
                    var msgEl = document.createElement('div');
                    msgEl.className = 'message sys-msg';
                    var headerEl = document.createElement('div');
                    headerEl.className = 'message-header';
                    headerEl.innerHTML = '<div class="avatar">藥</div><span>杏林</span>';
                    var contentEl = document.createElement('div');
                    contentEl.className = 'message-content';
                    contentEl.innerHTML = '';
                    msgEl.appendChild(headerEl);
                    msgEl.appendChild(contentEl);
                    chatHistory.appendChild(msgEl);
                    await handleStreaming(query, filter, contentEl);
                } else {
                    addMessage('system', data.answer);
                }
                await loadHistory();
            } catch (e) {
                console.error('发送消息错误:', e);
                removeTyping(typingEl);
                addMessage('system', '抱歉，发生错误: ' + e.message);
            } finally {
                isResponseInProgress = false;
                scrollToBottom();
            }
        }

        function removeTyping(el) {
            if (el && el.parentNode) el.parentNode.removeChild(el);
        }

        async function handleStreaming(query, filter, contentEl) {
            if (socket && socket.readyState === WebSocket.OPEN) socket.close();
            return new Promise(function(resolve, reject) {
                var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                var wsUrl = protocol + '//' + window.location.host + API_BASE_URL + '/api/stream';
                socket = new WebSocket(wsUrl);
                var accumulated = '';

                socket.onopen = function() {
                    socket.send(JSON.stringify({ query: query, source_filter: filter || null, session_id: currentSessionId }));
                };

                socket.onmessage = function(event) {
                    var data = JSON.parse(event.data);
                    if (data.type === 'token') {
                        accumulated += data.token;
                        contentEl.innerHTML = marked.parse(accumulated);
                        scrollToBottom();
                    } else if (data.type === 'end') {
                        socket.close();
                        resolve();
                    } else if (data.type === 'error') {
                        contentEl.innerHTML += '<p style="color:#c41e3a">[错误: ' + data.error + ']</p>';
                        socket.close();
                        reject(new Error(data.error));
                    }
                };

                socket.onerror = function(err) {
                    contentEl.innerHTML += '<p style="color:#c41e3a">[连接错误]</p>';
                    reject(err);
                };
                socket.onclose = function() { resolve(); };
            });
        }

        function addMessage(type, content) {
            var msgEl = document.createElement('div');
            msgEl.className = 'message ' + (type === 'user' ? 'user-msg' : 'sys-msg');

            var headerEl = document.createElement('div');
            headerEl.className = 'message-header';
            if (type === 'user') {
                headerEl.innerHTML = '<div class="avatar"><i class="fas fa-user"></i></div><span>问</span>';
            } else {
                headerEl.innerHTML = '<div class="avatar">藥</div><span>杏林</span>';
            }

            var contentEl = document.createElement('div');
            contentEl.className = 'message-content';
            contentEl.innerHTML = marked.parse(content);

            msgEl.appendChild(headerEl);
            msgEl.appendChild(contentEl);
            chatHistory.appendChild(msgEl);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
