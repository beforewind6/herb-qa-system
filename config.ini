# MySQL 配置
[mysql]
host = localhost
user = root
password = 123456
database = tcm_kg

# Redis 配置
[redis]
host = localhost
port = 6379
password = 1234
db = 0


# Milvus 配置
[milvus]
host = localhost
port = 19530
database_name = default
collection_name = tcm_rag


# LLM 配置
[llm]
model = qwen-plus
dashscope_api_key = YOUR_DASHSCOPE_API_KEY_HERE
dashscope_base_url = https://dashscope.aliyuncs.com/compatible-mode/v1

# 检索参数配置
[retrieval]
parent_chunk_size = 1200
child_chunk_size = 300
chunk_overlap = 50
retrieval_k = 10
candidate_m = 3

# 应用配置
[app]
valid_sources = ["中药基础", "方剂学", "中医基础理论", "针灸学"]
customer_service_phone = 10086

# 日志配置
[logger]
log_file = logs/app.log